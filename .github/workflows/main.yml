on:
  push:
    branches: [main]

name: 🚀 Deploy website on push

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: 📂 Sync files via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: api.starnest.com.ng
          username: starnest_deploy@api.starnest.com.ng
          password: ${{ secrets.ftp_password }}
          protocol: ftps # ← This is the key fix
          # port: 21              # Usually not needed, defaults to 21 for FTPS
          # Optional but recommended for Django:
          local-dir: ./
          server-dir: /home/altisbik/api.starnest.com.ng/ # Change to your actual Python App root or public_html subfolder
